.btn-sobre {

.social-links {

}

.icon {
  width: 50px;
  height: 50px;
  background-color: #0e0e1a; /* Fundo escuro do círculo */
  border-radius: 50%;        /* Faz o círculo perfeito */
  display: flex;

  justify-content: center;    /* Centraliza o ícone horizontalmente */
  color: #00fbff;            /* Cor ciano/neon dos ícones */
  text-decoration: none;
  font-size: 22px;
  transition: all 0.3s ease; /* Animação suave para o hover */
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
}

/* Efeito ao passar o mouse (Hover) */
.icon:hover {
  background-color: #00fbff; /* Inverte as cores */
  color: #0e0e1a;
  transform: translateY(-5px); /* Dá um leve pulinho */
  box-shadow: 0 0 20px rgba(0, 251, 255, 0.6); /* Brilho neon */
}
#tsparticles {

.reveal {
  position: relative;
  overflow: hidden;
  display: inline-block;
}

  display: block;
  transform: translateY(100%);
  transition: transform 1s ease;
}

      <script>
        var typed = new Typed(&#39;#typed&#39;, {
  strings: [&#39;Desenvolvimento Web&#39;, &#39;Criação de Logos&#39;, &#39;UI/UX&#39;], // As frases que vão alternar
  typeSpeed: 60,       // Velocidade de digitação (em milissegundos)
  backSpeed: 40,       // Velocidade de apagamento
  backDelay: 1500,     // Tempo que o texto fica visível antes de apagar
  loop: true           // Faz a animação rodar infinitamente
});

// Exemplo com biblioteca externa
ScrollReveal().reveal(&#39;.reveal&#39;, { 
  delay: 200, 
  distance: &#39;50px&#39;, 
  origin: &#39;bottom&#39; 
});

tsParticles.load(&#34;tsparticles&#34;, {
  particles: {
    number: {
      value: 80, // Quantidade de pontos
      density: {
        enable: true,
        area: 800
      }
    },
    color: {
      value: &#34;#000000&#34; // Cor dos pontos
    },
    links: {
      enable: true,      // Habilita as linhas conectando
      distance: 150,     // Distância máxima para conectar
      color: &#34;#000000&#34;,  // Cor das linhas
      opacity: 0.2,      // Transparência das linhas
      width: 1
    },
    move: {
      enable: true,
      speed: 2,          // Velocidade do movimento
      direction: &#34;none&#34;,
      random: false,
      straight: false,
      outModes: &#34;out&#34;
    },
    size: {
      value: { min: 1, max: 3 } // Tamanho dos pontos
    },
    opacity: {
      value: 0.5
    }
  },
  interactivity: {
    events: {
      onHover: {
        enable: true,
        mode: &#34;grab&#34; // As linhas &#34;grudam&#34; no mouse ao passar
      },
      onClick: {
        enable: true,
        mode: &#34;push&#34; // Adiciona mais partículas ao clicar
      }
    },
    modes: {
      grab: {
        distance: 140,
        links: {
          opacity: 0.5
        }
      }
    }
  },
  retina_detect: true
});
